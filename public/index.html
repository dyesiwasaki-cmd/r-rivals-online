<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アールライバルズ オンライン</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ タイトル画面 ============ -->
<div id="lobby" class="screen active">
  <div class="lobby-container">
    <div class="title-art">
      <img src="images/logo.png" alt="R-Rivals Online" class="title-logo">
    </div>

    <button class="img-btn lobby-btn" onclick="openNamePopup()">
      <img src="images/btn-name.png" alt="あなたの名前">
    </button>

    <div class="lobby-grid">
      <button class="img-btn lobby-btn" onclick="openCreatePopup()">
        <img src="images/btn-create.png" alt="ルームを作る">
      </button>
      <button class="img-btn lobby-btn" onclick="openJoinPopup()">
        <img src="images/btn-password.png" alt="合言葉">
      </button>
      <button class="img-btn lobby-btn" onclick="openJoinPopup()">
        <img src="images/btn-join.png" alt="参加">
      </button>
      <button class="img-btn lobby-btn" onclick="startCpuGame()">
        <img src="images/btn-cpu.png" alt="CPU対戦">
      </button>
    </div>
    <div class="lobby-bottom-btns">
      <button class="img-btn lobby-btn" onclick="toggleExtraRules()">
        <img src="images/btn-extra-rules.png" alt="追加ルール">
      </button>
      <button class="img-btn lobby-btn" onclick="toggleRules()">
        <img src="images/btn-howto.png" alt="遊び方">
      </button>
    </div>
  </div>

  <!-- ルーム作成ポップアップ -->
  <div id="createPopup" class="popup-overlay hidden" onclick="closeOnOverlay(event,'createPopup')">
    <div class="popup-box">
      <button class="popup-close" onclick="closeCreatePopup()">&times;</button>
      <h3>ルームを作る</h3>
      <div class="rule-select-area">
        <button class="btn-rules-toggle" onclick="toggleRuleSelect()">追加ルール</button>
        <div id="ruleSelectPanel" class="rule-select-panel hidden">
          <label class="rule-opt">
            <input type="radio" name="optRule" value="" checked>
            <span class="rule-opt-name">通常ルール</span>
            <small>標準のルールで対戦</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="traitor">
            <span class="rule-opt-name">トレイター</span>
            <small>1枚捨てて残り7枚を相手と交換</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="loser">
            <span class="rule-opt-name">ルーザー</span>
            <small>相手の勝ち数を4にしたら勝利</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="fortune">
            <span class="rule-opt-name">フォーチューン</span>
            <small>山札から毎回1枚めくって対決</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="threeCard">
            <span class="rule-opt-name">スリーカード</span>
            <small>手元3枚から1枚選んで対決</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="randomDeal">
            <span class="rule-opt-name">ランダムディール</span>
            <small>16枚をシャッフルして8枚ずつ配る</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="impatience">
            <span class="rule-opt-name">インペイシェンス</span>
            <small>3勝先取で決着</small>
          </label>
          <label class="rule-opt">
            <input type="radio" name="optRule" value="numbers">
            <span class="rule-opt-name">ナンバーズ</span>
            <small>道化と大臣の能力のみ使用</small>
          </label>
          <label class="rule-opt disabled">
            <input type="radio" name="optRule" value="draft" disabled>
            <span class="rule-opt-name">ドラフト</span>
            <small>準備中…</small>
          </label>
          <label class="rule-opt disabled">
            <input type="radio" name="optRule" value="princessAttack" disabled>
            <span class="rule-opt-name">プリンセス・アタック</span>
            <small>準備中…</small>
          </label>
          <label class="rule-opt disabled">
            <input type="radio" name="optRule" value="trueKing" disabled>
            <span class="rule-opt-name">トゥルー・キング</span>
            <small>準備中…</small>
          </label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createRoom()" id="btnCreate" style="width:100%;margin-top:16px;">対戦相手を探す</button>
      <div id="waitingMsg" class="waiting-msg hidden">
        <div class="spinner"></div>
        <p>対戦相手を待っています…</p>
        <p class="room-code-display">合言葉: <strong id="displayCode"></strong></p>
        <button class="copy-btn" onclick="copyCode()" id="copyBtn">📋 コピーする</button>
        <p class="hint">この合言葉を相手に伝えてください</p>
      </div>
    </div>
  </div>

  <!-- 合言葉参加ポップアップ -->
  <div id="joinPopup" class="popup-overlay hidden" onclick="closeOnOverlay(event,'joinPopup')">
    <div class="popup-box">
      <button class="popup-close" onclick="closeJoinPopup()">&times;</button>
      <h3>合言葉で参加</h3>
      <input type="text" id="roomCode" placeholder="合言葉を入力" maxlength="4" class="input-field" style="text-align:center;text-transform:uppercase;font-size:24px;letter-spacing:6px;margin:16px 0;">
      <button class="btn btn-primary" onclick="joinRoom()" id="btnJoin" style="width:100%;">参加する</button>
    </div>
  </div>

  <!-- 名前入力ポップアップ -->
  <div id="namePopup" class="popup-overlay hidden" onclick="closeOnOverlay(event,'namePopup')">
    <div class="popup-box">
      <button class="popup-close" onclick="closeNamePopup()">&times;</button>
      <h3>あなたの名前</h3>
      <input type="text" id="playerName" placeholder="名前を入力" maxlength="12" class="input-field" style="text-align:center;font-size:20px;margin:16px 0;" list="nameHistory">
      <datalist id="nameHistory"></datalist>
      <button class="btn btn-primary" onclick="confirmName()" style="width:100%;">決定</button>
    </div>
  </div>
</div>

<!-- ============ 追加ルール選択 ============ -->
<div id="extraRulesOverlay" class="popup-overlay hidden" onclick="closeOnOverlay(event,'extraRulesOverlay')">
  <div class="extra-rules-box">
    <button class="popup-close" onclick="toggleExtraRules()">&times;</button>
    <img src="images/btn-extra-rules.png" alt="追加ルール" class="extra-rules-header-img">
    <div class="extra-rules-list">
      <label class="extra-rule-opt" data-rule="">
        <input type="radio" name="extraRule" value="" checked>
        <div class="extra-rule-info">
          <span class="extra-rule-name">通常ルール</span>
          <small>標準のルールで対戦</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="traitor">
        <input type="radio" name="extraRule" value="traitor">
        <div class="extra-rule-info">
          <span class="extra-rule-name">トレイター</span>
          <small>1枚捨てて残り7枚を相手と交換</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="loser">
        <input type="radio" name="extraRule" value="loser">
        <div class="extra-rule-info">
          <span class="extra-rule-name">ルーザー</span>
          <small>相手の勝ち数を4にしたら勝利</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="fortune">
        <input type="radio" name="extraRule" value="fortune">
        <div class="extra-rule-info">
          <span class="extra-rule-name">フォーチューン</span>
          <small>山札から毎回1枚めくって対決</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="threeCard">
        <input type="radio" name="extraRule" value="threeCard">
        <div class="extra-rule-info">
          <span class="extra-rule-name">スリーカード</span>
          <small>手元3枚から1枚選んで対決</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="randomDeal">
        <input type="radio" name="extraRule" value="randomDeal">
        <div class="extra-rule-info">
          <span class="extra-rule-name">ランダムディール</span>
          <small>16枚をシャッフルして8枚ずつ配る</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="impatience">
        <input type="radio" name="extraRule" value="impatience">
        <div class="extra-rule-info">
          <span class="extra-rule-name">インペイシェンス</span>
          <small>3勝先取で決着</small>
        </div>
      </label>
      <label class="extra-rule-opt" data-rule="numbers">
        <input type="radio" name="extraRule" value="numbers">
        <div class="extra-rule-info">
          <span class="extra-rule-name">ナンバーズ</span>
          <small>道化と大臣の能力のみ使用</small>
        </div>
      </label>
    </div>
    <button class="btn btn-primary extra-rules-confirm" onclick="toggleExtraRules()">決定</button>
  </div>
</div>

<!-- ============ ルール説明 ============ -->
<div id="rulesOverlay" class="popup-overlay hidden" onclick="closeOnOverlay(event,'rulesOverlay')">
  <div class="rules-img-wrap">
    <button class="rules-close" onclick="toggleRules()">&times;</button>
    <img src="images/rules.png" alt="遊び方" class="rules-img">
  </div>
</div>

<!-- ============ ゲーム画面 ============ -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="round-info">
      <span id="roundNum">ROUND 1</span>
      <div class="score-goal" id="scoreGoal">4勝先取</div>
      <div id="activeRuleBadge" class="rule-badge hidden"></div>
    </div>
  </div>

  <!-- ステータスバー（持ち越し・ボーナス表示） -->
  <div id="statusBar" class="status-bar hidden"></div>

  <!-- メインエリア（左パネル + 中央 + 右パネル） -->
  <div class="game-body">
    <!-- 左: 相手の残りカード -->
    <div class="side-panel side-left" id="sidePanel">
      <div class="side-section-title">相手の残り</div>
      <div class="tracker-cards" id="opponentTracker"></div>
    </div>

    <!-- 中央（バトルフィールド + 手札） -->
    <div class="game-center">
      <div class="battlefield">
        <div class="battle-column">
          <div class="player-info player-info-opponent">
            <span class="player-name" id="opponentName">相手</span>
            <span class="player-score" id="opponentScore">0</span>
            <span class="bonus-badge hidden" id="opBonusBadge">+2</span>
          </div>
          <div class="battle-slot" id="opponentSlot">
            <div class="card-back" id="opponentCardBack">
              <div class="card-back-design">?</div>
            </div>
          </div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="battle-column">
          <div class="player-info player-info-me">
            <span class="player-name" id="myName">あなた</span>
            <span class="player-score" id="myScore">0</span>
            <span class="bonus-badge hidden" id="myBonusBadge">+2</span>
          </div>
          <div class="battle-slot" id="mySlot">
            <div class="card-placeholder" id="myCardPlaceholder">カードを選べ</div>
          </div>
        </div>
      </div>
      <div class="hand-area">
        <div class="hand-label">— あなたの手札 —</div>
        <div class="hand" id="hand"></div>
      </div>
    </div>

    <!-- 右: 対戦フロー -->
    <div class="side-panel side-right" id="flowPanel">
      <div class="side-section-title">対戦フロー</div>
      <div class="battle-flow" id="battleFlow"></div>
    </div>
  </div>

  <!-- ラウンド結果 -->
  <div id="roundResultOverlay" class="result-overlay hidden">
    <div class="result-content">
      <div class="result-cards">
        <div class="result-card-wrap">
          <div class="rc-name-label" id="rcName1"></div>
          <div class="result-card" id="resultCard1"></div>
        </div>
        <div class="result-vs" id="resultVs">⚡</div>
        <div class="result-card-wrap">
          <div class="rc-name-label" id="rcName2"></div>
          <div class="result-card" id="resultCard2"></div>
        </div>
      </div>
      <div class="result-log" id="resultLog"></div>
      <div class="result-scores" id="resultScores"></div>
      <div class="result-hint">クリックして次へ</div>
    </div>
  </div>

  <!-- 密偵リビール -->
  <div id="spyRevealOverlay" class="spy-overlay hidden">
    <div class="spy-content">
      <div class="spy-title">🕵️ 密偵の報告</div>
      <div class="spy-card" id="spyCardDisplay"></div>
      <p id="spyMessage"></p>
      <p class="spy-hint">カードを選んで相手を倒せ！</p>
      <button class="btn btn-secondary" onclick="closeSpyReveal()">了解</button>
    </div>
  </div>

  <!-- トレイター: 捨て札フェーズ -->
  <div id="traitorOverlay" class="traitor-overlay hidden">
    <div class="traitor-content">
      <div class="traitor-icon">🗡️</div>
      <h3>トレイター</h3>
      <p>1枚選んで捨て札にしてください<br><small>残りの7枚は相手と交換されます</small></p>
      <div class="traitor-cards" id="traitorCards"></div>
      <button class="btn btn-primary" id="traitorConfirm" disabled onclick="confirmDiscard()">捨てる</button>
    </div>
  </div>

  <!-- サイドパネル開閉（モバイル用） -->
  <div class="side-toggle" onclick="toggleSidePanel()">📋</div>
</div>

<!-- ============ ゲームオーバー ============ -->
<div id="gameOver" class="screen">
  <div class="gameover-container">
    <div class="gameover-crown" id="gameoverCrown"></div>
    <h2 id="gameoverTitle"></h2>
    <div id="gameoverScores"></div>
    <div id="gameoverHistory"></div>
    <div class="total-record" id="totalRecord"></div>
    <button class="btn-reset-record" onclick="resetRecord()">成績リセット</button>
    <button class="btn btn-primary" onclick="rematch()">
      <span class="btn-icon">🔄</span> もう一度
    </button>
    <button class="btn btn-secondary" onclick="backToLobby()">
      ロビーに戻る
    </button>
  </div>
</div>

<!-- 音量コントロール -->
<div class="vol-btn" id="volBtn" onclick="toggleMute()" oncontextmenu="event.preventDefault();toggleVolPanel()">🔊</div>
<button class="vol-gear" id="volGear" onclick="toggleVolPanel()">⚙</button>
<div class="vol-panel hidden" id="volPanel">
  <div class="vol-row">
    <span class="vol-label">🎵 BGM</span>
    <input type="range" min="0" max="100" class="vol-slider" id="bgmSlider" oninput="setBgmVol(this.value)">
    <span class="vol-val" id="bgmVal">100</span>
  </div>
  <div class="vol-row">
    <span class="vol-label">🔔 効果音</span>
    <input type="range" min="0" max="100" class="vol-slider" id="seSlider" oninput="setSeVol(this.value)">
    <span class="vol-val" id="seVal">100</span>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
